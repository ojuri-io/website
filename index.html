    <!-- Preloader (inline so it paints before React/CSS bundle loads). -->
    <style>
      .oj-preloader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #FAF6F0;
        z-index: 9999;
        transition: opacity 600ms ease;
      }
      .oj-preloader[data-done="true"] { opacity: 0; pointer-events: none; }
      .oj-preloader[data-hidden="true"] { display: none; }

      .oj-lockup {
        display: flex;
        flex-direction: column;
        align-items: center;
        transform: translateY(-2vh);
      }

      .oj-mark {
        display: block;
        width: clamp(48px, 7vw, 76px);
        height: auto;
        margin-bottom: clamp(20px, 2.6vh, 30px);
        opacity: 0;
        transform: translateY(8px);
        animation: oj-rise 820ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      .oj-mark-ring {
        stroke-dasharray: 50.3;
        stroke-dashoffset: 50.3;
        animation: oj-ring 860ms cubic-bezier(0.22, 1, 0.36, 1) 220ms forwards;
      }
      .oj-mark-dot {
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
        animation:
          oj-fade 360ms ease 820ms forwards,
          oj-dot-pulse 2200ms ease-in-out 1300ms infinite;
      }

      .oj-word {
        font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
        font-weight: 600;
        font-size: clamp(60px, 10.5vw, 108px);
        line-height: 1;
        letter-spacing: -0.025em;
        color: #1A1612;
        opacity: 0;
        transform: translateY(10px);
        animation: oj-rise 900ms cubic-bezier(0.22, 1, 0.36, 1) 280ms forwards;
      }

      .oj-rule {
        width: clamp(120px, 16vw, 168px);
        height: 1px;
        margin: clamp(20px, 2.4vh, 28px) 0 clamp(16px, 2vh, 22px);
        background: #D9D2C6;
        transform: scaleX(0);
        transform-origin: center;
        animation: oj-draw 760ms cubic-bezier(0.22, 1, 0.36, 1) 600ms forwards;
      }

      .oj-tag {
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-weight: 500;
        font-size: clamp(11px, 1.05vw, 13px);
        letter-spacing: 0.42em;
        text-indent: 0.42em;
        text-transform: uppercase;
        color: #857E72;
        opacity: 0;
        animation: oj-fade 800ms ease 900ms forwards;
      }

      @keyframes oj-rise { to { opacity: 1; transform: translateY(0); } }
      @keyframes oj-ring { to { stroke-dashoffset: 0; } }
      @keyframes oj-draw { to { transform: scaleX(1); } }
      @keyframes oj-fade { to { opacity: 1; } }
      @keyframes oj-dot-pulse {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.32; }
      }

      @media (prefers-reduced-motion: reduce) {
        .oj-mark, .oj-mark-ring, .oj-mark-dot, .oj-word, .oj-rule, .oj-tag {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .oj-mark-ring { stroke-dashoffset: 0 !important; }
        .oj-rule { transform: scaleX(1) !important; }
      }
    </style>
  </head>
  <body>
    <div class="oj-preloader" id="ojPreloader" role="status" aria-live="polite" aria-label="Loading Ojuri">
      <div class="oj-lockup">
        <svg class="oj-mark" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle class="oj-mark-ring" cx="11" cy="16" r="8" fill="none" stroke="#1A1612" stroke-width="3"></circle>
          <circle class="oj-mark-dot" cx="25" cy="23" r="3" fill="#1A1612"></circle>
        </svg>
        <div class="oj-word">Ojuri</div>
        <div class="oj-rule"></div>
        <div class="oj-tag">Bears Witness</div>
      </div>
    </div>
    <script>
      (function () {
        var MIN_VISIBLE_MS = 1400;
        var start = Date.now();
        var fired = false;
        window.ojuriPreloaderDone = function () {
          if (fired) return;
          fired = true;
          var el = document.getElementById('ojPreloader');
          if (!el) return;
          var wait = Math.max(0, MIN_VISIBLE_MS - (Date.now() - start));
          setTimeout(function () {
            el.setAttribute('data-done', 'true');
            el.addEventListener('transitionend', function handler() {
              el.removeEventListener('transitionend', handler);
              el.setAttribute('data-hidden', 'true');
            });
          }, wait);
        };
      })();
    </script>

    <a href="#main" class="skip-link">Skip to content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
